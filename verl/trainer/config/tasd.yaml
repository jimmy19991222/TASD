defaults:
  - ppo_trainer
  - user
  - _self_

max_model_len: 18944

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 32
    entropy_coeff: 0.0                  # entropy bonus 系数，>0 时添加 -β*H(π) 鼓励探索，建议 0.001~0.05
    policy_loss:
      loss_mode: tasd
    self_distillation:
      max_reprompt_len: 10240
      is_clip: 2.0
      entropy_weighting: false
      entropy_temperature: 1.0
      entropy_weighting_version: "v4"

      # EMA teacher 配置（loss_mode="tasd" 时生效）
      teacher_regularization: "none"   # "none"=用当前step模型，"ema"=用EMA历史平滑版本
      teacher_update_rate: 0.05        # EMA 更新率 α: θ_teacher ← (1-α)*θ_teacher + α*θ_student，0=固定不更新

      include_environment_feedback: false
      success_reward_threshold: 1.0
      dont_reprompt_on_self_success: false  # TASD场景下无效，由use_self_as_teacher_on_success控制
    optim:
      lr: 1e-5
  rollout:
    n: 8
    calculate_log_probs: True
    repetition_penalty: 1.05    # 抑制复读机：entropy崩溃时模型会输出超长重复序列撑满8192 tokens

algorithm:
  adv_estimator: tasd
  norm_adv_by_std_in_grpo: False
  tasd:
    reward_type: "teacher_prob"     # teacher_prob | teacher_prob_plus_verified | teacher_sentence_prob | log_ratio | vocab_log_ratio | forward_kl | reverse_kl | jsd | teacher_prob_relative | teacher_prob_certainty | top1_match | topk_match | student_topk_teacher_prob | student_topk_teacher_prob_weighted | teacher_logit | teacher_seq_log_prob | teacher_log_prob | teacher_prob_binary
                                   # teacher_seq_log_prob: sequence-level 平均 log_prob，走 GRPO advantage 路径，天然有正有负，根本解决 entropy 崩溃
                                   # teacher_sentence_prob: 几何平均 teacher prob，exp(mean(log_probs))，值域 (0,1)，与 teacher_prob 同量级，广播到所有 token
    alpha: 0.5                     # jsd/kl类时生效：0.0=reverse_kl, 0.5=jsd, 1.0=forward_kl
    tail_correction: false         # K足够大时false，K较小时建议true
    distill_topk: 100              # vocab_log_ratio/jsd/kl类需要topk
    distill_temperature: 1.0       # teacher forward 的 softmax temperature（独立于 rollout temperature）；>1.0 使分布更平，reward 方差更大，避免 std 归一化爆炸
    include_successful_rollouts: true      # true=成功rollout也走TASD；false=成功rollout不走TASD
    use_self_as_teacher_on_success: true   # 成功rollout用自己的response作为teacher context
    success_reward_threshold: 1.0          # reward>=1.0视为成功，与self_distillation保持一致
    reward_transform: "none"               # tanh→(-1,1) | tanh01→(0,1) | sigmoid→(0,1) | none
    reward_scale: 1.0                      # tanh(x/scale)的scale，控制敏感度
    # ── advantage 计算 ──
    norm_adv_by_std: false                 # 是否除以group std归一化（teacher_prob∈[0,1]时建议false）
    adv_std_floor: 0.0                     # std下界，防止group_std过小导致adv爆炸
                                           # - float: 直接使用该值（如0.35）
                                           # - "auto": 自动计算 = 1/sqrt(group_size)，对应最坏情况（只有1个正确）
                                           # - "none" or 0.0: 不使用floor
    clip_adv: true                         # 是否对advantage做clipping
    clip_adv_value: 5.0                    # clipping范围 [-v, v]
    # ── Teacher-GAE（实验性）──
    use_teacher_gae: false                 # true=用Teacher-GAE替代简单减group_mean；需要reward_type支持topk
    teacher_gae_gamma: 1.0                 # GAE折扣因子（语言模型通常用1.0）
    teacher_gae_lambda: 0.95               # GAE lambda（0=纯TD, 1=纯MC，0.95是常用折中）

data:
  train_batch_size: 32

trainer:
  val_before_train: False
