defaults:
  - ppo_trainer
  - user
  - _self_

# TCCA-Lite (Token-level Causal Credit Assignment, ours).
#
# 完整设计: research/tcca_v2_design.md (pivot 2026-05-16 chain → Lite)
#
# 流程:
#   Step 0: 标准 GRPO student rollout n=8 per prompt (复用现有 generate_sequences)
#   Step 1: 对 reward < threshold 的失败样本:
#           a. teacher 用 OPSD context (含 reference answer) forward → divergence
#           b. t* = argmax |logp_T_opsd - logp_S| (排尾 8 token)
#           c. teacher 写 1 token at t* (under OPSD ctx)
#           d. student 续写到 EOS (async per-sample via vLLM server_manager)
#           e. composite y' = y_<t* + teacher_token + student_continuation
#           f. reward_fn(composite) → R(y'); ΔR = R(y') - R(y_s)
#   Step 2: Mode B append composite to batch (同 uid, GRPO group reduction 自然处理变长 group)
#   Step 3: divergence_credit:
#           - 原 y at t*: c_t = -ΔR (negative credit at student's wrong choice)
#           - composite y' at t*: c_t = +ΔR (positive credit at teacher's choice)
#           - composite y'.response_mask[:, :t*] = 0 (Layer 2: shared prefix off)
#   Step 4: Advantage:
#           A_t = (A_seq + λ_div · clip(c_t, ±clip)) · response_mask · length_scale
#                 └────GRPO base────┘   └─── TCCA divergence-point modulation ───┘
#
# 与 prior_shift / RLSD / SDZ (Self-Distilled Zero) 差异:
#   - prior_shift: 用 g_t 作 token 重权重, 不做 intervention (相关性归因)
#   - RLSD: 用 (P_T/P_S) ratio 作 magnitude (统计学), 无 counterfactual
#   - SDZ: 同模型 self-correct, 无外部 teacher, sequence-level process supervision
#   - TCCA: OPSD teacher 单 token 介入 + 真实 ΔR token-level causal credit

max_model_len: 18944
seed: 42

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 32
    self_distillation:
      max_reprompt_len: 10240
      is_clip: 2.0
      teacher_regularization: ema
      teacher_update_rate: 0.05
      include_environment_feedback: false
      success_reward_threshold: 1.0
      dont_reprompt_on_self_success: false
    optim:
      lr: 1e-5
  rollout:
    # 标准 GRPO rollout n=8 per prompt (TCCA-Lite 在此之上对失败样本加 1 个 composite)
    n: 8
    calculate_log_probs: True

algorithm:
  adv_estimator: intervention_credit
  intervention_credit:
    # ── 工作模式 ─────────────────────────────────────────────────────
    # false: 不做 intervention, 退化为纯 GRPO (plumbing 验证 / baseline 对照)
    # true : 失败样本上做 OPSD teacher + student 真续写 + ΔR token credit (TCCA-Lite 主路径)
    enable_intervention: false

    # ── OPSD teacher context (Layer 1 关键) ────────────────────────
    # 加 "The correct answer is {r}.\n" 到 user prompt 前缀, teacher forward 时用
    # {r} 来自 batch.non_tensor_batch['reward_model'][i]['ground_truth']
    opsd_ref_template: "The correct answer is {r}.\n"

    # ── divergence 位置选择 ───────────────────────────────────────────
    # 当前 TCCA-Lite 仅支持 argmax_excl_eos (排尾 N token)
    divergence_metric: argmax_excl_eos
    exclude_tail_tokens: 8

    # ── intervention 触发条件 / 容量限制 ─────────────────────────────
    # reward < failed_threshold 视为失败 → 触发 intervention
    failed_threshold: 0.5
    # 每个 prompt 最多 intervention 几个 failed sample (cap)
    max_intervention_per_prompt: 4
    # teacher 采样温度 (0.0 = greedy argmax)
    teacher_decode_temperature: 0.0

    # ── Layer 3: divergence-point credit modulation (additive) ─────
    # A_t = (A_seq + λ_div · clip(c_t, ±clip)) · response_mask · length_scale
    #   λ_div = 0: 退化为纯 GRPO + Layer 2 mask (选项 D baseline)
    #   λ_div > 0: TCCA divergence-point modulation (选项 C main)
    # 论文 ablation: {0, 0.5, 1.0, 2.0}
    lambda_div_credit: 1.0
    # c_t magnitude clip (避免单点极端 ΔR 爆炸)
    divergence_credit_clip: 1.0

    # ── length protection (复用 prior_shift v2 防护) ──────────────────
    min_response_length: 50
    length_penalty_type: linear   # linear | zero

    # ── GRPO 风格归一化 ────────────────────────────────────────────
    norm_adv_by_std_in_grpo: False

  rollout_correction:
    rollout_is: token
    rollout_is_threshold: 2.0

data:
  train_batch_size: 32
  gen_batch_size: ${data.train_batch_size}

trainer:
  val_before_train: False
