defaults:
  - ppo_trainer
  - user
  - _self_

max_model_len: 18944

# ── 随机种子（可复现性）─────────────────────────────────────────────────
seed: 42

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 32
    entropy_coeff: 0.001        # DAPO: 保持探索
    # PPO clip ratio 配置（DAPO 风格：只 clip 下界，不 clip 上界）
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 10000    # DAPO: 不 clip 上界（让好的 token 充分学习）
    policy_loss:
      loss_mode: tasd
    self_distillation:
      max_reprompt_len: 10240
      is_clip: 2.0
      # EMA teacher 配置
      teacher_regularization: "none"
      teacher_update_rate: 0.05
      include_environment_feedback: false
      success_reward_threshold: 1.0
    optim:
      lr: 1e-5
  rollout:
    n: 8
    calculate_log_probs: True
    repetition_penalty: 1.05

algorithm:
  adv_estimator: tasd
  norm_adv_by_std_in_grpo: False
  tasd:
    # ── 核心参数（清爽版）────────────────────────────────────
    reward_type: "teacher_prob"     # "teacher_prob" | "teacher_log_prob"
    
    # ── entropy gate: 熵门控，筛选有效训练信号 ──────────────────
    entropy_gate: "none"            # "none" | "hard" | "soft"
    
    # ── distill topk（熵门控需要）─────────────────────────────
    distill_topk: 100
    distill_temperature: 1.0
    
    # ── advantage clipping ────────────────────────────────────
    norm_adv_by_std: false          # 是否除以 group std（std 基于 effective token 统计，排除熵门控过滤的位置）
    adv_std_floor: 0.0              # std下界：0.0 | auto | float，防止 group_std 过小导致 adv 爆炸
    clip_adv: true
    clip_adv_value: 2.0
    
    # ── 成功 rollout 配置 ─────────────────────────────────────
    include_successful_rollouts: true
    use_self_as_teacher_on_success: true
    success_reward_threshold: 1.0
  # ── DAPO 动态采样（Dynamic Sampling / Group Filtering）──────────────
  # 过滤全对/全错的 group，只保留有区分度的 group 参与训练
  filter_groups:
    _target_: verl.trainer.config.FilterGroupsConfig
    enable: False             # 默认关闭，可通过 Nebula 覆盖
    metric: acc               # 用于判断是否全同：acc / seq_reward / seq_final_reward
    max_num_gen_batches: 0    # 0 = 不限制重采样次数

data:
  train_batch_size: 32
  gen_batch_size: ${data.train_batch_size}

trainer:
  val_before_train: False
  seed: ${seed}  # 引用顶层 seed，确保一致性
