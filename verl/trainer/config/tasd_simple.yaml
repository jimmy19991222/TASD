defaults:
  - ppo_trainer
  - user
  - _self_

max_model_len: 18944

# ── 随机种子（可复现性）─────────────────────────────────────────────────
seed: 42

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 32
    entropy_coeff: 0.001        # DAPO: 保持探索
    # PPO clip ratio 配置（DAPO 风格：只 clip 下界，不 clip 上界）
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 10000    # DAPO: 不 clip 上界（让好的 token 充分学习）
    policy_loss:
      loss_mode: tasd
    self_distillation:
      max_reprompt_len: 10240
      is_clip: 2.0
      # EMA teacher 配置
      teacher_regularization: "none"
      teacher_update_rate: 0.05
      include_environment_feedback: false
      success_reward_threshold: 1.0
    optim:
      lr: 1e-5
  rollout:
    n: 8
    calculate_log_probs: True
    repetition_penalty: 1.05

algorithm:
  adv_estimator: tasd
  norm_adv_by_std_in_grpo: False
  tasd:
    # ── 核心参数（清爽版）────────────────────────────────────
    reward_type: "teacher_prob"     # "teacher_prob" | "teacher_log_prob" | "outcome"
    
    # ── entropy gate: 熵门控，筛选有效训练信号 ──────────────────
    # none: 无门控
    # hard: 硬过滤，被过滤的 token reward=0 且不产生梯度（影响 mean/std）
    # hard_keep_reward: 硬过滤但保留 reward，只在 advantage 阶段过滤（不影响 mean/std）
    # soft: 软门控，按熵差加权 reward
    # top_k_agreement: teacher-student 共识门控——在 student top-K 候选集中取 teacher argmax，
    #                  若 student 采样 token == teacher argmax 则过滤（两者一致 = 无修改意愿）
    entropy_gate: "none"            # "none" | "hard" | "hard_keep_reward" | "soft" | "top_k_agreement"
    entropy_gate_ratio: 1.0         # hard gate 保留比例（默认 1.0 = 原始 hard gate）
                                    # 0.8 = 保留熵差 top 80%，0.5 = 保留 top 50%
                                    # 仅在 entropy_gate="hard" 时生效
    gate_warmup_steps: 0            # warmup 期间不启用 gate（teacher ≈ student 时避免全过滤）
                                    # 0 = 不 warmup，建议设为 LR warmup 步数（如 10）
    
    # ── distill topk（熵门控需要）─────────────────────────────
    distill_topk: 100
    distill_temperature: 1.0

    # ── top_k_agreement 专属参数 ─────────────────────────────
    # top_k_agreement_k: student 候选集大小（优先生效，覆盖 distill_topk）
    # top_k_agreement_eps: 当一条 response 全部 token 都一致（全被过滤）时，
    #                     整条 response 的 gate_mask 赋值为 eps，避免无梯度
    top_k_agreement_k: 512
    top_k_agreement_eps: 0.1
    
    # ── advantage clipping ────────────────────────────────────
    norm_adv_by_std: false          # 是否除以 group std（std 基于 effective token 统计，排除熵门控过滤的位置）
    adv_std_floor: 0.0              # std下界：0.0 | auto | float，防止 group_std 过小导致 adv 爆炸
    clip_adv: true
    clip_adv_value: 2.0
    # group_mean_mode: group mean/std 的统计粒度
    #   "token"：所有有效 token 打平统计（默认，原有方式，存在 length bias）
    #   "seq"  ：先 per-seq 取 token 均值估计 group mean/std，advantage 仍是 token 级
    #            adv[i,t] = (r[i,t] - group_mean_seq) / std_seq，消除 length bias
    group_mean_mode: "token"
    
    # ── advantage entropy weighting ──────────────────────────
    # 在 advantage 阶段按熵信息加权（不影响 group_mean）
    # 
    # 职责分离：
    #   - ENTROPY_GATE（reward 阶段）：控制哪些 token 参与训练（hard filter）
    #   - ADV_ENTROPY_WEIGHT（advantage 阶段）：对参与训练的 token 做软加权
    # 
    # adv_entropy_weight 只做加权，不过滤。过滤由 ENTROPY_GATE 通过 effective_mask 统一控制。
    # "none" | "teacher_prob" | "teacher_conf" | "certainty_diff"
    adv_entropy_weight: "none"
    
    # ── 成功 rollout 配置 ─────────────────────────────────────
    include_successful_rollouts: true
    use_self_as_teacher_on_success: true
    success_reward_threshold: 1.0
    
    # ── error_pool: group-shared 错例池注入 teacher context ────
    # teacher_context_mode: 
    #   "per_rollout" (默认, v5): 每个 rollout 独立构建 teacher context
    #   "group_shared": 同 uid 组内共享 error_pool + reference_answer
    teacher_context_mode: "per_rollout"
    max_errors_in_pool: 8               # 每 group 去重后错例上限
    error_answer_max_chars: 1024        # 每条错例答案字符上限
    error_pool_format_only: true        # 仅格式错例入池（避免语义泄漏）
    
    # ── bidirectional credit assignment ──────────────────────
    # 用 baseline 隔离 token-level signal，解决 context pollution
    # adv_baseline_mode:
    #   "none" (默认): 不做 baseline 修正，直接用原始 advantage
    #   "causal_ema": 用因果 EMA 估计 baseline V_t = α·V_{t-1} + (1-α)·A_{t-1}
    #                 A_bidir_t = A_t - V_t，其中 α = 1 - 2^{-1/τ}
    #                 τ=32 → α≈0.021 (half-life=32 tokens, 参考 FIPO)
    #                 τ=7  → α≈0.09  (half-life=7 tokens, 快速衰减)
    adv_baseline_mode: "none"
    causal_ema_alpha: 0.021             # EMA 衰减系数（仅 causal_ema 模式生效）
                                        # α=0.021 ≈ τ=32 (FIPO 默认)
                                        # α=0.09  ≈ τ=7  (快速衰减)
    
    # ── teacher cross-entropy baseline ─────────────────────
    # 纯 teacher advantage，不需要 seq-level GRPO advantage
    # A_t = Q_t - V_t
    # Q_t = teacher_log_probs_on_response  # teacher 对实际 token 的评分
    # V_t = E_student[teacher(·)] = Σ π_student(a_k) · log π_teacher(a_k)
    # 优势：无需归一化，teacher≈student 时 A_t≈0 自然安全退化
    teacher_ce_clip_value: 5.0            # advantage clipping 阈值
  # ── DAPO 动态采样（Dynamic Sampling / Group Filtering）──────────────
  # 过滤全对/全错的 group，只保留有区分度的 group 参与训练
  filter_groups:
    _target_: verl.trainer.config.FilterGroupsConfig
    enable: False             # 默认关闭，可通过 Nebula 覆盖
    metric: acc               # 用于判断是否全同：acc / seq_reward / seq_final_reward
    max_num_gen_batches: 0    # 0 = 不限制重采样次数

data:
  train_batch_size: 32
  gen_batch_size: ${data.train_batch_size}

trainer:
  val_before_train: False
  seed: ${seed}  # 引用顶层 seed，确保一致性
